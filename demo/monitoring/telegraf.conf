# Minimal Telegraf config for the docker-compose smoke test.
# Scrapes Kafka JMX Prometheus metrics and discards the output so that no
# external InfluxDB/Prometheus server is required.  The purpose is only to
# verify that the monitoring container starts cleanly under read_only: true.
#
# PROMETHEUS_URLS is injected by docker-entrypoint.sh from PROMETHEUS_ADDRESSES.

[agent]
  interval = "$KAFKA_MONITORING_INTERVAL"
  flush_interval = "$KAFKA_MONITORING_INTERVAL"
  debug = false
  quiet = true
  omit_hostname = false

# Discard all metrics — no storage backend needed for smoke testing.
[[outputs.discard]]

# Scrape Kafka JMX Prometheus exporter.
[[inputs.prometheus]]
  urls = [$PROMETHEUS_URLS]
  response_timeout = "10s"
