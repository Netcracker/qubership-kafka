name: Run Nightly Kafka Pipeline

permissions:
  contents: read
  packages: read
  actions: read

on:
  push
#on:
#  schedule:
#    - cron: '0 1 * * *'

jobs:
  Nightly-Kafka-Pipeline:
    uses: Netcracker/qubership-test-pipelines/.github/workflows/kafka.yaml@feat/allure_reports #v1.6.2
    with:
      service_branch: 'main'
      pipeline_branch: 'feat/allure_reports' #this value must match the value after '@' in 'uses'
      scope: 'nightly'
    secrets:
      AWS_S3_ACCESS_KEY_ID: ${{secrets.AWS_S3_ACCESS_KEY_ID}}
      AWS_S3_ACCESS_KEY_SECRET: ${{secrets.AWS_S3_ACCESS_KEY_SECRET}}
