name: Run Nightly Kafka Pipeline

permissions:
  contents: read
  packages: read
  actions: read

on:
  push
#  schedule:
#    - cron: '0 1 * * *'

jobs:
  Nightly-Kafka-Pipeline:
    uses: Netcracker/qubership-test-pipelines/.github/workflows/kafka.yaml@f34b2ea08c91860e9ed2624a9d63840a8ce4e3c0 #v1.13.0
    with:
      service_branch: 'main'
      pipeline_branch: 'f34b2ea08c91860e9ed2624a9d63840a8ce4e3c0' #this value must match the value after '@' in 'uses'
      scope: 'nightly'
    secrets:
      AWS_S3_ACCESS_KEY_ID: ${{secrets.AWS_S3_ACCESS_KEY_ID}}
      AWS_S3_ACCESS_KEY_SECRET: ${{secrets.AWS_S3_ACCESS_KEY_SECRET}}
