name: Run Nightly Kafka Pipeline

permissions:
  contents: read
  packages: read
  actions: read

on:
  schedule:
    - cron: '0 1 * * *'

jobs:
  Nightly-Kafka-Pipeline:
    uses: Netcracker/qubership-test-pipelines/.github/workflows/kafka.yaml@9fcb2de51b4d510b52ffca883515bdb388cbc16f # v1.14.0
    with:
      service_branch: 'main'
      pipeline_branch: '9fcb2de51b4d510b52ffca883515bdb388cbc16f' # v1.14.0 renovate: depName=Netcracker/qubership-test-pipelines
      scope: 'nightly'
      allure: true
      verify_timeout_minutes: 30
    secrets:
      AWS_S3_ACCESS_KEY_ID: ${{secrets.AWS_S3_ACCESS_KEY_ID}}
      AWS_S3_ACCESS_KEY_SECRET: ${{secrets.AWS_S3_ACCESS_KEY_SECRET}}

