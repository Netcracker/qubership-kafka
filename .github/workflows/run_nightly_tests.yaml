name: Run Nightly Kafka Pipeline

permissions:
  contents: read
  packages: read
  actions: read

on:
#  schedule:
#    - cron: '0 1 * * *'
  push

jobs:
  Nightly-Kafka-Pipeline:
    uses: Netcracker/qubership-test-pipelines/.github/workflows/kafka.yaml@fix/disable_atp # v1.8.0
    with:
      service_branch: 'main'
      pipeline_branch: 'fix/disable_atp' #this value must match the value after '@' in 'uses'
      scope: 'nightly'
    secrets:
      AWS_S3_ACCESS_KEY_ID: ${{secrets.AWS_S3_ACCESS_KEY_ID}}
      AWS_S3_ACCESS_KEY_SECRET: ${{secrets.AWS_S3_ACCESS_KEY_SECRET}}

