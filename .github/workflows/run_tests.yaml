name: Run Kafka Pipeline

permissions:
  contents: read
  packages: read
  actions: read

on:
  push
#  pull_request:
#    types: [opened, synchronize, reopened]
#    branches: [main]
#    paths-ignore:
#      - "docs/**"
#      - "CODE-OF-CONDUCT.md"
#      - "CONTRIBUTING.md"
#      - "LICENSE"
#      - "README.md"
#      - "SECURITY.md"
#  push:
#    branches: [main]
#    paths-ignore:
#      - "docs/**"
#      - "CODE-OF-CONDUCT.md"
#      - "CONTRIBUTING.md"
#      - "LICENSE"
#      - "README.md"
#      - "SECURITY.md"

jobs:
  changes:
    runs-on: ubuntu-latest
    steps:
      - name: changes
        id: changes
        run: |
          echo "run_tests=false" >> $GITHUB_ENV
  Wait-for-images:
    runs-on: ubuntu-latest
    outputs:
      conclusion: ${{ steps.wait.outputs.conclusion }}
    steps:
      - name: Wait for push.yml to complete
        uses: netcracker/qubership-workflow-hub/actions/wait-for-workflow@3e428f45132119ce49d90f3770a45d4fe1d1078d  # v2.0.4
        id: wait
        with:
          workflow: dev_build.yml
          token: ${{ secrets.GITHUB_TOKEN }}
          poll-interval: 20
  Kafka-Pipeline:
    needs: Wait-for-images
    uses: Netcracker/qubership-test-pipelines/.github/workflows/kafka.yaml@0317a7311f0fdd1e6d492fb3a75d722835851b15 #v1.6.1
    with:
      repository_name: ${{ github.repository }}
      service_branch: '${{ github.head_ref || github.ref_name }}'
      pipeline_branch: '0317a7311f0fdd1e6d492fb3a75d722835851b15' #this value must match the value after '@' in 'uses'
    secrets:
      AWS_S3_ACCESS_KEY_ID: ${{secrets.AWS_S3_ACCESS_KEY_ID}}
      AWS_S3_ACCESS_KEY_SECRET: ${{secrets.AWS_S3_ACCESS_KEY_SECRET}}
  final-status-check:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs: [ Kafka-Pipeline ]
    steps:
      - name: Check final status
        run: |
          if [[ "{{ env.ERROR_FLAG }}" == "false" ]]; then
            echo "No dev_build run – only documentation changed. Status check passed."
            exit 0
          fi
          
          if [[ "${{ needs.Kafka-Pipeline.result }}" != "success" ]]; then
            echo "Tests failed or were skipped (status: ${{ needs.Kafka-Pipeline.result }})"
            exit 1
          else
            echo "Tests completed successfully"
            exit 0
          fi
