{{- if .Values.akhq.envoyGateway.enabled }}
{{- if and (.Capabilities.APIVersions.Has "gateway.networking.k8s.io/v1") (eq .Values.PAAS_PLATFORM "KUBERNETES") }}
{{- if (and .Values.akhq.install (eq (include "akhq.ingressEnabled" .) "true")) }}

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: akhq-httproute
  labels:
    {{- include "kafka-services.defaultLabels" . | nindent 4 }}
  annotations:
    route.openshift.io/termination: edge
spec:
  parentRefs:
  {{- range .Values.akhq.envoyGateway.parentRefs }}
    - name: {{ .name }}
      namespace: {{ .namespace }}
      port: 443
  {{- end }}

  hostnames:
  {{- if .Values.akhq.envoyGateway.host }}
    - {{ .Values.akhq.envoyGateway.host | quote }}
  {{- else }}
    - {{ include "akhq.ingressHost" . | quote }}
  {{- end }}

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: akhq
          port: 8080

{{- end }}
{{- end }}
{{- end }}